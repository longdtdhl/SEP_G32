<select class="w-full rounded-xl border-outline-variant bg-surface-container-lowest py-md px-lg focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md appearance-none cursor-pointer outline-none" id="package-type">

<option value="standard">Standard</option>
<option value="premium">Premium</option>
<option value="initial">Initial Consultation</option>
</select>
</div>

</div>

</div>

<script>
        // Micro-interactions for form inputs
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });

        // Form submission prevent default for demo
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('Care package creation triggered');
        });
    </script>
