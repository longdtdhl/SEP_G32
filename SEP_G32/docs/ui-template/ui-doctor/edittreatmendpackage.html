<!-- Main Content -->
<main class="flex-grow pt-2xl mt-xl max-w-4xl mx-auto w-full px-margin-mobile">
<!-- Header Actions -->
<div class="flex items-center gap-md mb-lg">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-all active:scale-90">
<span class="material-symbols-outlined text-on-surface" style="font-size: 28px;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Information care package</h1>
</div>
<!-- Form Container -->
<div class="form-card bg-surface-container-lowest rounded-[20px] p-lg md:p-xl mb-2xl">
<form class="space-y-lg">
<!-- Package Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="package-name">Package Name:</label>
<input class="w-full h-12 px-md py-xs border border-outline-variant rounded-[12px] bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="package-name" name="package-name" type="text" value="Comprehensive Wellness Foundation"/>
</div>
<!-- Package Type -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="package-type">Package Type:</label>
<div class="relative">
<select class="w-full h-12 px-md py-xs border border-outline-variant rounded-[12px] bg-white appearance-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="package-type" name="package-type">
<option value="Specialty">Specialty</option>
<option value="Trauma">Trauma</option>
<option value="Clinical Psychology">Clinical Psychology</option>
<option value="Anxiety Management">Anxiety Management</option>
<option value="General Wellness">General Wellness</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Description -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="description">Description:</label>
<textarea class="w-full px-md py-sm border border-outline-variant rounded-[12px] bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none resize-none" id="description" name="description" rows="4">A multi-disciplinary approach to mental wellbeing, combining evidence-based cognitive behavioral techniques with personalized emotional support strategies for long-term resilience.</textarea>
</div>
<!-- Target Condition -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="target-condition">Target Condition:</label>
<textarea class="w-full px-md py-sm border border-outline-variant rounded-[12px] bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none resize-none" id="target-condition" name="target-condition" rows="3">Generalized Anxiety Disorder (GAD), mild-to-moderate depression, and chronic stress management.</textarea>
</div>
<!-- Two-Column Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Total Sessions -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="total-sessions">Total Sessions:</label>
<input class="w-full h-12 px-md py-xs border border-outline-variant rounded-[12px] bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="total-sessions" name="total-sessions" type="number" value="12"/>
</div>
<!-- Price -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="price">Price ($):</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-semibold">$</span>
<input class="w-full h-12 pl-xl pr-md py-xs border border-outline-variant rounded-[12px] bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none" id="price" name="price" type="text" value="1,200.00"/>
</div>
</div>
</div>

<button class="bg-primary text-on-primary font-label-md text-label-md px-xl py-md rounded-[12px] shadow-sm hover:brightness-110 active:scale-95 transition-all duration-200 flex items-center gap-sm" type="submit">
<span>Save changes</span>
<span class="material-symbols-outlined text-[18px]">check_circle</span>
</button>

<script>
        // Micro-interaction for the back button
        document.querySelector('button[aria-label="Go back"]').addEventListener('click', () => {
            window.history.back();
        });

        // Form submission prevention for demo
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>Saved!</span><span class="material-symbols-outlined text-[18px]">done</span>';
            btn.classList.replace('bg-primary', 'bg-tertiary-container');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-tertiary-container', 'bg-primary');
            }, 2000);
        });
    </script>
