<!-- Main Content -->
<main class="pt-28 pb-xl px-md max-w-4xl mx-auto">
<!-- Header Actions -->
<div class="flex items-center justify-between mb-xl">
<button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-all duration-200" onclick="history.back()">
<span class="material-symbols-outlined">arrow_back</span>

<h1 class="text-headline-md font-headline-md text-on-surface text-center flex-grow pr-20">Care Package Information</h1>
</div>
<!-- Form Card Container -->
<section class="bg-surface-container-lowest rounded-[20px] soft-shadow p-xl border border-outline-variant/30">
<form action="#" class="space-y-lg" method="POST">
<!-- Two Column Row for Basic Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Package Name -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="package-name">Package Name</label>
<input class="w-full px-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all" id="package-name" name="package-name" placeholder="e.g., Stress Management Pro" type="text">
</div>
<!-- Package Type -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="package-type">Package Type</label>
<div class="relative">
<select class="w-full appearance-none px-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all cursor-pointer" id="package-type" name="package-type">
<option value="specialty">Specialty</option>
<option value="general">General Counseling</option>
<option value="intensive">Intensive Care</option>
<option value="group">Group Therapy</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
</div>
<!-- One Column Row for Descriptions -->
<div class="space-y-lg">
<!-- Description -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="description">Description</label>
<textarea class="w-full px-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all resize-none" id="description" name="description" placeholder="Briefly describe the therapeutic focus and goals..." rows="4"></textarea>
</div>
<!-- Target Condition -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="target-condition">Target Condition</label>
<textarea class="w-full px-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all resize-none" id="target-condition" name="target-condition" placeholder="Specify conditions like Anxiety, ADHD, or Post-Partum Depression..." rows="3"></textarea>
</div>
</div>
<!-- Two Column Row for Specifics -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Total Sessions -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="sessions">Total Sessions</label>
<div class="relative">
<input class="w-full px-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all" id="sessions" name="sessions" placeholder="10" type="number">
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant text-body-sm">sessions</span>
</div>
</div>
<!-- Price -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant block" for="price">Price (USD)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">$</span>
<input class="w-full pl-8 pr-md py-3 rounded-xl border border-outline-variant bg-surface input-focus text-body-md transition-all" id="price" name="price" placeholder="0.00" type="text">
</div>
</div>
</div>

<div class="flex items-center justify-end gap-md pt-xl mt-xl border-t border-outline-variant/30">

<button class="px-2xl py-3 rounded-xl bg-primary text-on-primary font-label-md hover:bg-[#20513e] shadow-md hover:shadow-lg transition-all duration-300 active:scale-95" type="submit">
                        Recommend
                    </button>
</div>
</form>

</div>

<a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm font-label-sm" href="#">Terms of Service</a>
<a class="text-on-surface-variant hover:text-primary transition-colors text-label-sm font-label-sm" href="#">Support</a>
</div>
</footer>
<script>
        // Simple micro-interaction for form completion visualization
        const inputs = document.querySelectorAll('input, select, textarea');
        const recommendBtn = document.querySelector('button[type="submit"]');
        
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const filled = Array.from(inputs).every(i => i.value.trim() !== '');
                if (filled) {
                    recommendBtn.classList.remove('opacity-80');
                    recommendBtn.classList.add('shadow-primary/20');
                }
            });
        });

        // Add focus effect to the card on interaction
        const card = document.querySelector('section');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                card.classList.add('ring-1', 'ring-primary/10');
            });
            input.addEventListener('blur', () => {
                card.classList.remove('ring-1', 'ring-primary/10');
            });
        });
    </script>
